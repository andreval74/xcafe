
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Link para Token | xcafe</title>
  <link rel="icon" type="image/png" href="imgs/xcafe-32x32.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="styles/globals.css" rel="stylesheet">
  <link href="styles/link-index.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <!-- Biblioteca QRCode.js com fallback -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script>
    // Fallback para carregar QRCode se o primeiro falhar
    if (typeof QRCode === 'undefined') {
      console.warn('⚠️ Primeira tentativa de carregar QRCode falhou, tentando CDN alternativo...');
      const script = document.createElement('script');
      script.src = 'https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js';
      script.onload = () => console.log('✅ QRCode carregado via CDN alternativo');
      script.onerror = () => console.error('❌ Falha ao carregar QRCode via CDN alternativo');
      document.head.appendChild(script);
    }
  </script>
</head>
<body>
<!-- Header -->
  <header data-component="header"></header>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8 col-xl-7">
        <div class="card shadow-lg border-primary">
          <div class="card-header bg-primary text-white">
            <h2 class="mb-0"><i class="bi bi-link-45deg me-2"></i>Gerador de Link para Token</h2>
          </div>
          <div class="card-body">
            <form id="token-link-form" autocomplete="off" onsubmit="return false;">
              <div class="mb-3">
                <label for="networkSearch" class="form-label">Rede Blockchain</label>
                <input id="networkSearch" class="form-control form-control-lg" autocomplete="off" placeholder="Digite o nome ou ChainID da Rede (Ex: BNB ou 56)">
                <div id="networkAutocomplete" class="list-group position-absolute w-100"></div>
              </div>
              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <label for="rpcUrl" class="form-label">RPC URL</label>
                  <input id="rpcUrl" class="form-control" placeholder="https://bsc-dataseed.binance.org" readonly>
                </div>
                <div class="col-md-6">
                  <label for="blockExplorer" class="form-label">Block Explorer URL</label>
                  <input id="blockExplorer" class="form-control" placeholder="https://bscscan.com" readonly>
                </div>
              </div>
              <!-- Removido: Símbolo da Moeda e Decimais da seção de rede -->
              <div class="row g-3 mb-3 align-items-center">
                <div class="col-md-9">
                  <label for="tokenAddress" class="form-label">Endereço do Token</label>
                  <input id="tokenAddress" class="form-control" placeholder="Endereço do Token (0x...)" />
                </div>
                <div class="col-md-3 d-grid">
                  <label class="form-label d-none d-md-block">&nbsp;</label>
                  <button type="button" class="btn btn-secondary" id="btnTokenSearch">
                    <i class="bi bi-search"></i> Buscar Token
                  </button>
                </div>
              </div>
              <div id="tokenLoading" style="display:none">
                <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                Buscando dados do token...
              </div>
              <div class="row g-3 mb-3">
                <div class="col-md-4">
                  <label for="tokenName" class="form-label">Nome do Token</label>
                  <input id="tokenName" class="form-control" placeholder="Nome" readonly />
                </div>
                <div class="col-md-4">
                  <label for="tokenSymbol" class="form-label">Símbolo</label>
                  <input id="tokenSymbol" class="form-control" placeholder="Símbolo" readonly />
                </div>
                <div class="col-md-4">
                  <label for="tokenDecimals" class="form-label">Decimais</label>
                  <input id="tokenDecimals" class="form-control" placeholder="18" type="number" readonly />
                </div>
              </div>
              <div class="mb-3">
                <label for="tokenImage" class="form-label">Imagem (opcional)</label>
                <input id="tokenImage" class="form-control" placeholder="URL da Imagem" readonly />
              </div>
              <div class="mb-4">
                <button type="button" class="btn btn-primary w-100" id="btnGenerateLink">
                  <i class="bi bi-link-45deg"></i> Gerar Link
                </button>
              </div>
              <div id="generatedLinkContainer" class="mb-4" style="display:none;">
                <label class="form-label">Link Gerado:</label>
                <div class="input-group">
                  <input id="generatedLink" class="form-control" readonly />
                  <button class="btn btn-outline-secondary" id="btnCopyLink" type="button"><i class="bi bi-clipboard"></i></button>
                  <button class="btn btn-outline-success" id="btnShareLink" type="button"><i class="bi bi-share"></i></button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
<!-- Footer -->
  <footer data-component="footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/link-index.js"></script>
  <script src="js/template-loader.js"></script>
  
  <!-- Script de verificação da biblioteca QRCode -->
  <script>
    // Verificar se a biblioteca QRCode foi carregada
    document.addEventListener('DOMContentLoaded', function() {
      console.log('🔍 Verificando biblioteca QRCode...');
      if (typeof QRCode !== 'undefined') {
        console.log('✅ Biblioteca QRCode carregada com sucesso!');
      } else {
        console.warn('⚠️ Biblioteca QRCode não foi carregada. Usando fallback API.');
      }
    });
  </script>
</body>
</html>
