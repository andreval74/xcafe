<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XCafe - Exemplo de Animações</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles/globals.css">
</head>
<body class="bg-dark">
    <!-- Background com partículas -->
    <div class="xcafe-gradient-bg">
        <!-- Partículas flutuantes -->
        <div class="xcafe-particles">
            <div class="xcafe-particle"></div>
            <div class="xcafe-particle"></div>
            <div class="xcafe-particle"></div>
            <div class="xcafe-particle"></div>
        </div>
        
        <!-- Container principal -->
        <div class="xcafe-container">
            <div class="xcafe-content">
                <!-- Logo com efeitos -->
                <div class="xcafe-logo-wrapper xcafe-fade-in-up">
                    <div class="xcafe-logo-glow"></div>
                    <img src="imgs/xcafe.png" alt="XCafe Logo" class="xcafe-logo">
                </div>
                
                <!-- Título principal -->
                <h1 class="xcafe-title xcafe-slide-in-left">XCafe Tokens</h1>
                
                <!-- Subtítulo -->
                <h2 class="xcafe-subtitle xcafe-slide-in-right">Sua principal ferramenta de tokenizações</h2>
                
                <!-- Descrição -->
                <p class="xcafe-description xcafe-fade-in">
                    Crie, gerencie e comercialize tokens de forma simples e segura. 
                    A plataforma mais avançada para tokenização do mercado.
                </p>
                
                <!-- Badge -->
                <div class="xcafe-bounce-in">
                    <span class="xcafe-badge">
                        <i class="bi bi-rocket-takeoff me-2"></i>
                        Em Breve
                    </span>
                </div>
                
                <!-- Features -->
                <div class="xcafe-features xcafe-features-animate">
                    <div class="xcafe-feature-item">
                        <i class="bi bi-shield-check xcafe-feature-icon"></i>
                        <div class="xcafe-feature-title">Segurança</div>
                        <div class="xcafe-feature-desc">Tecnologia blockchain</div>
                    </div>
                    
                    <div class="xcafe-feature-item">
                        <i class="bi bi-lightning xcafe-feature-icon"></i>
                        <div class="xcafe-feature-title">Rapidez</div>
                        <div class="xcafe-feature-desc">Transações instantâneas</div>
                    </div>
                    
                    <div class="xcafe-feature-item">
                        <i class="bi bi-gear xcafe-feature-icon"></i>
                        <div class="xcafe-feature-title">Facilidade</div>
                        <div class="xcafe-feature-desc">Interface intuitiva</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
